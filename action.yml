name: Sudden Agent
author: Sudden
branding:
  icon: arrow-right
  color: red

description: Run programmable agents on any GitHub Workflow to enable automation across your repo.

inputs:
  agent_api_key:
    description: Agent API key
    required: false
    default: ""
  agent_auth_file:
    description: Agent auth file content (agent-specific)
    required: false
    default: ""
  agent_auth_file_secret_name:
    description: GitHub Actions secret name to update when the agent auth file refreshes
    required: false
    default: ""
  github_token:
    description: GitHub token used by the action (defaults to the workflow token)
    required: false
    default: ""
  workflow_github_token:
    description: Internal-only workflow token (do not set manually)
    required: false
    default: ${{ github.token }}
  github_token_actor:
    description: Actor login for the GitHub token (required for non-workflow tokens, e.g. `sudden-agent[bot]`)
    required: false
    default: ""
  agent:
    description: Agent to run
    required: false
    default: codex
  model:
    description: Agent model override (for Codex, append reasoning effort and service tier with /, e.g. gpt-5.5/xhigh/fast)
    required: false
    default: ""
  prompt:
    description: Optional extra instructions for the agent
    required: false
    default: ""
  resume:
    description: Enable session resume across runs
    required: false
  sudo:
    description: Disable sandbox; allow write + network access for the agent
    required: false
    default: "false"

runs:
  using: node20
  main: dist/index.js
